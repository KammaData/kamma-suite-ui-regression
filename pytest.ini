[pytest]
log_cli = false
log_cli_level = WARNING
addopts = --screenshot=only-on-failure --video=retain-on-failure
markers =
    # Test Coverage
    smoke: mark tests as a smoke test
    regression: mark tests as a regression test
    # Test Type
    visual: mark tests that perform visual snapshot comparison
    api_validation: mark tests that validate UI data against API responses
    # Features
    auth: mark tests for authentication flows
    dashboard: mark tests for the main dashboard
    properties: mark tests for property views
    tenancy: mark tests for tenancy views
    compliance: mark tests for compliance views
    navigation: mark tests for navigation and routing
    exports: mark tests for the exports page
    # Status
    onlythis: used for testing scripts locally
    inprogress: used for tests whilst being developed
